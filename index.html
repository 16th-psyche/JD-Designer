    <button class="btn-download" id="exportBtn" onclick="window.print()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M8 10l-3-3M8 10l3-3" stroke="#1C1C1E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12h12" stroke="#1C1C1E" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      Download PDF
    </button>
  </header>

  <!-- ===== MAIN SPLIT PANE ===== -->
  <main class="app-main">

    <!-- LEFT PANEL: Builder -->
    <aside class="builder-panel" id="builderPanel">

      <!-- Global settings -->
      <section class="builder-section">
        <h3 class="builder-section__title">Page 1 — Cover</h3>
        <label class="field-label">Job Title</label>
        <input
          class="field-input"
          id="jobTitleInput"
          type="text"
          placeholder="e.g. Motion Graphic Designer"
          value="Motion Graphic Designer"
        />
        <div class="font-size-row">
          <label class="field-label" style="margin:0">Font Size</label>
          <div class="font-size-controls">
            <input type="range" id="fontSizeSlider" min="14" max="48" step="1" value="36" class="font-size-slider" />
            <span id="fontSizeDisplay" class="font-size-display">36px</span>
            <button id="fontSizeAutoBtn" class="btn btn--auto active" title="Auto-fit: scale to fill available width">Auto</button>
          </div>
        </div>
      </section>

      <!-- Block list -->
      <section class="builder-section builder-section--blocks">
        <h3 class="builder-section__title">Content Blocks</h3>
        <div id="blockList" class="block-list"></div>

        <!-- Add block dropdown -->
        <div class="add-block-wrap">
          <button class="btn btn--add" id="addBlockBtn">+ Add Block</button>
          <div class="add-block-menu" id="addBlockMenu">
            <button class="add-block-menu__item" data-type="header">
              <span class="block-badge block-badge--header">H</span> Section Header
            </button>
            <button class="add-block-menu__item" data-type="paragraph">
              <span class="block-badge block-badge--paragraph">P</span> Paragraph
            </button>
            <button class="add-block-menu__item" data-type="infobox">
              <span class="block-badge block-badge--infobox">I</span> Info / Highlight Box
            </button>
            <button class="add-block-menu__item" data-type="bullets">
              <span class="block-badge block-badge--bullets">B</span> Bullet List
            </button>
            <button class="add-block-menu__item" data-type="linksbox">
              <span class="block-badge block-badge--linksbox">L</span> Links Box
            </button>
            <button class="add-block-menu__item" data-type="note">
              <span class="block-badge block-badge--note">N</span> Note Box
            </button>
          </div>
        </div>
      </section>

      <section class="builder-section">
        <h3 class="builder-section__title">Footer URLs (Pages 2+)</h3>
        <label class="field-label">URL 1</label>
        <input class="field-input" id="footerUrl1" type="text" value="www.quantumleap.co.in" />
        <label class="field-label">URL 2</label>
        <input class="field-input" id="footerUrl2" type="text" value="www.rajivtalreja.com" />
        <label class="field-label">URL 3</label>
        <input class="field-input" id="footerUrl3" type="text" value="www.karanhasija.com" />
      </section>
    </aside>

    <!-- RIGHT PANEL: Preview -->
    <section class="preview-panel" id="previewPanel">
      <div class="pages-container" id="pagesContainer">
        <!-- Page 1: SVG Cover -->
        <div class="page page--cover" id="coverPage">
          <div class="page__svg-wrap" id="svgWrap">
            <div class="svg-loading">Loading cover design…</div>
          </div>
        </div>
        <!-- Pages 2+ rendered by JS -->
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
